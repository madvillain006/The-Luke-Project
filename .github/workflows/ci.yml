name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - master
      - "refactor/**"
      - "codex/**"

jobs:
  test:
    runs-on: windows-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .node-version
          cache: npm

      - name: Install
        run: npm ci

      - name: Test
        run: npm test
