<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Luke Brain</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #101214;
      --band: #15191d;
      --panel: #1b2025;
      --panel-2: #22282e;
      --line: #394047;
      --text: #edf1f4;
      --muted: #aab3bb;
      --ok: #62c98f;
      --warn: #e3b653;
      --bad: #e06f6f;
      --info: #72aeea;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
      font: 14px/1.45 ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      letter-spacing: 0;
    }

    button, input { font: inherit; }

    .shell {
      min-height: 100vh;
      display: grid;
      grid-template-rows: auto 1fr;
    }

    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 16px 18px;
      border-bottom: 1px solid var(--line);
      background: var(--band);
    }

    h1 {
      margin: 0;
      font-size: 26px;
      line-height: 1.1;
      letter-spacing: 0;
    }

    .subtitle {
      margin-top: 4px;
      color: var(--muted);
      font-size: 13px;
    }

    .toolbar {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    input {
      width: 100px;
      min-height: 34px;
      border: 1px solid var(--line);
      border-radius: 6px;
      color: var(--text);
      background: #121619;
      padding: 6px 8px;
    }

    button,
    .nav-link {
      min-height: 34px;
      border: 1px solid var(--line);
      border-radius: 6px;
      color: var(--text);
      background: var(--panel-2);
      padding: 6px 10px;
      cursor: pointer;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
    }

    button:hover,
    .nav-link:hover { border-color: var(--info); }

    main {
      padding: 16px;
      display: grid;
      gap: 16px;
    }

    .brain-map {
      display: grid;
      gap: 12px;
      justify-items: center;
    }

    .brain-node,
    .spine-node {
      width: min(720px, 100%);
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      padding: 14px;
      min-width: 0;
    }

    .brain-node {
      background: #182129;
      border-color: #50606c;
    }

    .node-top {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 8px;
      min-width: 0;
    }

    .node-top > div {
      min-width: 0;
    }

    .node-title {
      font-weight: 850;
      font-size: 16px;
      line-height: 1.2;
      overflow-wrap: anywhere;
    }

    .node-meta {
      color: var(--muted);
      font-size: 12px;
      overflow-wrap: anywhere;
    }

    .fork-lines {
      width: min(760px, 100%);
      height: 34px;
      border-left: 1px solid var(--line);
      border-right: 1px solid var(--line);
      border-top: 1px solid var(--line);
      position: relative;
    }

    .fork-lines::before {
      content: "";
      position: absolute;
      left: 50%;
      top: -12px;
      width: 1px;
      height: 46px;
      background: var(--line);
    }

    .spines {
      width: 100%;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 12px;
      align-items: stretch;
    }

    .spine-node {
      width: 100%;
      min-height: 240px;
      display: grid;
      grid-template-rows: auto 1fr;
      gap: 8px;
      overflow: hidden;
    }

    .status {
      display: inline-flex;
      align-items: center;
      min-height: 24px;
      padding: 2px 8px;
      border-radius: 999px;
      border: 1px solid var(--line);
      color: var(--muted);
      font-size: 12px;
      font-weight: 750;
      white-space: nowrap;
      max-width: 100%;
    }

    .status.nominal,
    .status.active,
    .status.done { color: var(--ok); border-color: rgba(98, 201, 143, 0.55); }
    .status.open,
    .status.searching,
    .status.attention { color: var(--warn); border-color: rgba(227, 182, 83, 0.6); }
    .status.unavailable,
    .status.blocked { color: var(--bad); border-color: rgba(224, 111, 111, 0.65); }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
      gap: 10px;
    }

    .metric {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #14181c;
      padding: 10px;
      min-width: 0;
    }

    .metric-label {
      color: var(--muted);
      font-size: 11px;
      text-transform: uppercase;
      margin-bottom: 4px;
    }

    .metric-value {
      font-weight: 800;
      overflow-wrap: anywhere;
    }

    ul {
      margin: 0;
      padding-left: 18px;
      display: grid;
      gap: 6px;
    }

    li {
      color: var(--text);
      overflow-wrap: anywhere;
    }

    .muted {
      color: var(--muted);
      overflow-wrap: anywhere;
    }

    .panel-grid {
      display: grid;
      grid-template-columns: minmax(280px, 0.9fr) minmax(360px, 1.1fr);
      gap: 12px;
      align-items: start;
    }

    .panel {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      overflow: hidden;
      min-width: 0;
    }

    .panel-header {
      padding: 10px 12px;
      background: var(--panel-2);
      border-bottom: 1px solid var(--line);
      font-weight: 850;
      text-transform: uppercase;
      font-size: 12px;
      overflow-wrap: anywhere;
    }

    .panel-body {
      padding: 12px;
      display: grid;
      gap: 10px;
    }

    .search-row {
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 9px;
      background: #14181c;
      display: grid;
      gap: 4px;
    }

    .action-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    pre {
      margin: 0;
      max-height: 420px;
      overflow: auto;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #0f1316;
      color: var(--text);
      padding: 10px;
      white-space: pre-wrap;
      overflow-wrap: anywhere;
    }

    .error {
      color: var(--bad);
      font-weight: 750;
    }

    @media (max-width: 980px) {
      header { align-items: flex-start; flex-direction: column; }
      .toolbar { justify-content: flex-start; }
      .spines,
      .grid,
      .panel-grid { grid-template-columns: 1fr; }
      .fork-lines { display: none; }
      input { width: min(120px, 28vw); }
    }
  </style>
</head>
<body>
  <div class="shell">
    <header>
      <div>
        <h1>Luke Brain</h1>
        <div class="subtitle">Local control plane with reporting spines</div>
      </div>
      <div class="toolbar">
        <a class="nav-link" href="/shell">Dashboard</a>
        <a class="nav-link" href="/luke">Luke Chat</a>
        <input id="lat" inputmode="decimal" placeholder="Buffalo lat">
        <input id="lon" inputmode="decimal" placeholder="Buffalo lon">
        <button id="refresh">Refresh</button>
      </div>
    </header>

    <main>
      <section class="brain-map">
        <div class="brain-node">
          <div class="node-top">
            <div>
              <div class="node-title" id="brain-title">Brain</div>
              <div class="node-meta" id="brain-meta">Loading</div>
            </div>
            <span class="status" id="brain-status">loading</span>
          </div>
          <div class="grid">
            <div class="metric">
              <div class="metric-label">Sub-agents</div>
              <div class="metric-value" id="metric-subagents">-</div>
            </div>
            <div class="metric">
              <div class="metric-label">Inbox</div>
              <div class="metric-value" id="metric-inbox">-</div>
            </div>
            <div class="metric">
              <div class="metric-label">Attention</div>
              <div class="metric-value" id="metric-attention">-</div>
            </div>
            <div class="metric">
              <div class="metric-label">Generated</div>
              <div class="metric-value" id="metric-generated">-</div>
            </div>
          </div>
        </div>

        <div class="fork-lines"></div>

        <div class="spines">
          <article class="spine-node" id="spine-trading"></article>
          <article class="spine-node" id="spine-automation"></article>
          <article class="spine-node" id="spine-developer"></article>
          <article class="spine-node" id="spine-daily"></article>
          <article class="spine-node" id="spine-history"></article>
        </div>
      </section>

      <section class="panel-grid">
        <div class="panel">
          <div class="panel-header">Brain Next Actions</div>
          <div class="panel-body">
            <ul id="next-actions"></ul>
          </div>
        </div>
        <div class="panel">
          <div class="panel-header">AI Automation Business Spine</div>
          <div class="panel-body" id="automation-actions"></div>
        </div>
        <div class="panel">
          <div class="panel-header">Automation Factory</div>
          <div class="panel-body">
            <div class="action-row">
              <button data-artifact="context-file">Context File</button>
              <button data-artifact="skill-file">Skill File</button>
              <button data-artifact="mcp-workflow">MCP Workflow</button>
              <button data-artifact="scheduled-automation">Schedule</button>
              <button data-artifact="niche-plan">Niche</button>
              <button data-artifact="case-study">Case Study</button>
              <button data-artifact="offer">Offer</button>
              <button data-artifact="outreach">Outreach</button>
            </div>
            <pre id="artifact-output">Ready</pre>
          </div>
        </div>
        <div class="panel">
          <div class="panel-header">Developer AI Stack Spine</div>
          <div class="panel-body" id="developer-actions"></div>
        </div>
        <div class="panel">
          <div class="panel-header">History-Career Search Spine</div>
          <div class="panel-body" id="searches"></div>
        </div>
      </section>
    </main>
  </div>

  <script>
    const $ = (id) => document.getElementById(id);

    function statusClass(status) {
      return `status ${String(status || 'unknown').toLowerCase()}`;
    }

    function setStatus(el, status) {
      el.className = statusClass(status);
      el.textContent = status || 'unknown';
    }

    function list(items) {
      if (!items || !items.length) return '<div class="muted">None</div>';
      return `<ul>${items.map(item => `<li>${escapeHtml(item)}</li>`).join('')}</ul>`;
    }

    function escapeHtml(value) {
      return String(value ?? '').replace(/[&<>"']/g, (ch) => ({
        '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
      }[ch]));
    }

    async function fetchJson(url) {
      const res = await fetch(url, { cache: 'no-store' });
      if (!res.ok) throw new Error(`${url} ${res.status}`);
      return res.json();
    }

    async function fetchOptional(url, fallback) {
      try {
        return await fetchJson(url);
      } catch {
        return fallback;
      }
    }

    function renderSpine(el, spine, bodyRows) {
      el.innerHTML = `
        <div>
          <div class="node-top">
            <div>
              <div class="node-title">${escapeHtml(spine.label)}</div>
              <div class="node-meta">${escapeHtml(spine.agent)}</div>
            </div>
            <span class="${statusClass(spine.status)}">${escapeHtml(spine.status)}</span>
          </div>
        </div>
        <div>${bodyRows}</div>
      `;
    }

    function render(snapshot, daily, history, automation, developer) {
      $('brain-title').textContent = snapshot.label || 'Luke brain';
      $('brain-meta').textContent = snapshot.role || '';
      setStatus($('brain-status'), snapshot.attention?.length ? 'attention' : 'nominal');
      $('metric-subagents').textContent = Object.keys(snapshot.subagents || {}).length;
      $('metric-inbox').textContent = snapshot.report_inbox?.count ?? 0;
      $('metric-attention').textContent = snapshot.attention?.length ?? 0;
      $('metric-generated').textContent = new Date(snapshot.generated_at).toLocaleTimeString();

      const trading = snapshot.subagents?.trading || {};
      renderSpine($('spine-trading'), trading, `
        <div class="grid">
          <div class="metric"><div class="metric-label">Mode</div><div class="metric-value">${escapeHtml(trading.mode)}</div></div>
          <div class="metric"><div class="metric-label">Gate</div><div class="metric-value">${escapeHtml(trading.human_gate)}</div></div>
          <div class="metric"><div class="metric-label">Trades</div><div class="metric-value">${trading.counts?.trades ?? 0}</div></div>
          <div class="metric"><div class="metric-label">Bobby</div><div class="metric-value">${trading.counts?.bobby_context ?? 0}</div></div>
        </div>
        <div class="muted">Recommendation-only. No broker execution authority.</div>
        ${list(trading.blockers || [])}
      `);

      renderSpine($('spine-automation'), automation, `
        <div class="grid">
          <div class="metric"><div class="metric-label">Goal</div><div class="metric-value">$${automation.monthly_goal ?? 10000}</div></div>
          <div class="metric"><div class="metric-label">Run Rate</div><div class="metric-value">$${automation.pipeline?.monthly_run_rate ?? 0}</div></div>
          <div class="metric"><div class="metric-label">Sub-Agents</div><div class="metric-value">${Object.keys(automation.subagents || {}).length}</div></div>
          <div class="metric"><div class="metric-label">Events</div><div class="metric-value">${automation.pipeline?.events ?? 0}</div></div>
        </div>
        <div class="muted">${escapeHtml(automation.recommended_start?.niche || '')}</div>
        ${list(automation.next_actions || [])}
      `);

      renderSpine($('spine-developer'), developer, `
        <div class="grid">
          <div class="metric"><div class="metric-label">Providers</div><div class="metric-value">${developer.provider_order?.length ?? 0}</div></div>
          <div class="metric"><div class="metric-label">Configured</div><div class="metric-value">${developer.pipeline?.configured_providers?.length ?? 0}</div></div>
          <div class="metric"><div class="metric-label">Events</div><div class="metric-value">${developer.pipeline?.events ?? 0}</div></div>
          <div class="metric"><div class="metric-label">Local</div><div class="metric-value">${escapeHtml((developer.provider_order || []).find(provider => provider.id === 'ollama')?.status || 'unknown')}</div></div>
        </div>
        <div class="muted">${escapeHtml(developer.local_only_truth || '')}</div>
        ${list((developer.provider_order || []).map(provider => `${provider.priority}. ${provider.label}: ${provider.status}`))}
      `);

      renderSpine($('spine-daily'), daily, `
        <div class="metric"><div class="metric-label">Weather</div><div class="metric-value">${escapeHtml(daily.weather?.summary)}</div></div>
        ${list((daily.checklist || []).map(item => `${item.label}: ${item.status} - ${item.detail}`))}
      `);

      renderSpine($('spine-history'), history, `
        <div class="grid">
          <div class="metric"><div class="metric-label">Accepted</div><div class="metric-value">${history.pipeline?.accepted ?? 0}</div></div>
          <div class="metric"><div class="metric-label">MLIS Filtered</div><div class="metric-value">${history.pipeline?.rejected_mlis ?? 0}</div></div>
        </div>
        ${list((history.tracks || []).map(track => track.label))}
      `);

      $('next-actions').innerHTML = (snapshot.next_actions || []).map(item => `<li>${escapeHtml(item)}</li>`).join('');
      $('automation-actions').innerHTML = (automation.first_30_days || []).map(item => `
        <div class="search-row">
          <strong>${escapeHtml(automation.label)}</strong>
          <span>${escapeHtml(item)}</span>
        </div>
      `).join('');
      $('developer-actions').innerHTML = (developer.setup_plan || []).map(item => `
        <div class="search-row">
          <strong>${escapeHtml(developer.label)}</strong>
          <span>${escapeHtml(item)}</span>
        </div>
      `).join('');
      $('searches').innerHTML = (history.next_searches || []).slice(0, 16).map(item => `
        <div class="search-row">
          <strong>${escapeHtml(item.track)}</strong>
          <span>${escapeHtml(item.query)}</span>
        </div>
      `).join('');
    }

    async function load() {
      const lat = $('lat').value.trim();
      const lon = $('lon').value.trim();
      localStorage.setItem('luke.brain.lat', lat);
      localStorage.setItem('luke.brain.lon', lon);
      const weatherQuery = lat && lon ? `?lat=${encodeURIComponent(lat)}&lon=${encodeURIComponent(lon)}` : '';
      try {
        const snapshot = await fetchJson('/agent/brain/status');
        const subagents = snapshot.subagents || {};
        const [daily, history, automation, developer] = await Promise.all([
          fetchOptional('/agent/brain/daily' + weatherQuery, subagents.daily || {}),
          fetchOptional('/agent/brain/history-career', subagents.history_career || {}),
          fetchOptional('/agent/brain/automation-business', subagents.automation_business || {}),
          fetchOptional('/agent/brain/developer-stack', subagents.developer_stack || {}),
        ]);
        render(snapshot, daily, history, automation, developer);
        requestAnimationFrame(() => {
          if (location.hash) document.querySelector(location.hash)?.scrollIntoView({ block: 'start' });
        });
      } catch (err) {
        $('brain-meta').innerHTML = `<span class="error">${escapeHtml(err.message)}</span>`;
      }
    }

    const artifactSample = {
      organization: 'regional history museum',
      niche: 'public history, museums, cultural orgs, and research teams',
      workflow: 'exhibit research brief production',
      task: 'exhibit research brief production',
      contact_name: 'Director',
      signals: [
        'small staff produces repeat research briefs',
        'grant and exhibit deadlines create backlog',
        'source material is scattered across files and email'
      ],
      weekly_saved_hours: 8,
      manual_minutes: 180,
      automated_minutes: 25,
      weekly_runs: 2
    };

    function artifactText(result) {
      const artifact = result.artifact || {};
      if (artifact.markdown) return artifact.markdown;
      if (artifact.cold_email) return `${artifact.subject}\n\n${artifact.cold_email}\n\nFollow-up:\n${artifact.follow_up}`;
      return JSON.stringify(artifact, null, 2);
    }

    async function runArtifact(kind) {
      const output = $('artifact-output');
      output.textContent = 'Working...';
      try {
        const res = await fetch(`/agent/brain/automation-business/${kind}`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(artifactSample),
        });
        const data = await res.json();
        if (!res.ok || !data.ok) throw new Error(data.error || 'artifact build failed');
        output.textContent = artifactText(data);
        load();
      } catch (err) {
        output.textContent = err.message;
      }
    }

    $('lat').value = localStorage.getItem('luke.brain.lat') || '42.8864';
    $('lon').value = localStorage.getItem('luke.brain.lon') || '-78.8784';
    $('refresh').addEventListener('click', load);
    document.querySelectorAll('[data-artifact]').forEach(button => {
      button.addEventListener('click', () => runArtifact(button.dataset.artifact));
    });
    load();
  </script>
</body>
</html>
